version: "3"
networks:
  application:
    driver: bridge
services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: mybackend
    ports:
      - 8000:8000
    volumes:
      - ./backend:/app
    depends_on:
      db:
        condition: service_healthy
    environment:
      - DB_HOST=mymysql
      - DB_PORT=3306
      - DB_DATABASE=test-db
      - DB_USERNAME=laravel
      - DB_PASSWORD=${DB_PASSWORD:-secret}
    networks:
      - application
    entrypoint: ['/bin/sh', '-c']
    command:
      - |
        composer install
        php artisan migrate
        php artisan serve --host=0.0.0.0 --port=8000
  db:
    image: mysql:latest
    ports:
      - "3306:3306"
    volumes:
      - ./data:/var/lib/mysql
    environment:
      - MYSQL_ROOT_PASSWORD=${MYSQL_ROOT_PASSWORD:-root}
      - MYSQL_USER=laravel
      - MYSQL_PASSWORD=${DB_PASSWORD:-secret}
      - MYSQL_DATABASE=test-db
    networks:
      - application
    container_name: mymysql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -u laravel -p${DB_PASSWORD:-secret} || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 5